name: Build, Test & Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TEST_TAG: devcontainer-test:${{ github.run_number }}

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU is needed to emulate arm64 during the multi-platform push step.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build (amd64, for testing) ────────────────────────────────────────────
      # We test on the native runner arch first.
      # This step also populates the GHA layer cache for both arches.
      - name: Build image → tarball (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/devcontainer.tar
          tags: ${{ env.TEST_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Test ─────────────────────────────────────────────────────────────────
      - name: Load image into local daemon
        run: docker load --input /tmp/devcontainer.tar

      - name: Run smoke tests
        run: |
          docker run --rm "${{ env.TEST_TAG }}" /usr/local/bin/test-devcontainer

      # ── Push (multi-platform, only after tests pass) ──────────────────────────
      # arm64 is built via QEMU emulation; amd64 layers come from the GHA cache.
      - name: Build & push to GHCR (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.run_number }}
          cache-from: type=gha
